repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        args: [--line-length=100]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.0
    hooks:
      - id: flake8
        args: [--max-line-length=100, --max-complexity=15]
        files: ^mcp-server/|^team\.py|^dashboard/

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python mcp-server/test_task_store.py
        language: system
        pass_filenames: false
        always_run: true
